name: Auto-update manifests

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes (max frequency)
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update csm-gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo welcomra1n/csm-gui --json tagName -q .tagName)
          VERSION="${LATEST#v}"
          CURRENT=$(jq -r .version bucket/csm-gui.json)

          echo "Latest: $VERSION  Current: $CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Up to date"
            exit 0
          fi

          ZIP_URL="https://github.com/welcomra1n/csm-gui/releases/download/${LATEST}/csm-gui-windows-amd64.zip"
          curl -sL -o /tmp/csm-gui.zip "$ZIP_URL"
          SHA=$(sha256sum /tmp/csm-gui.zip | awk '{print $1}')

          jq --arg v "$VERSION" --arg url "$ZIP_URL" --arg hash "$SHA" '
            .version = $v |
            .architecture["64bit"].url = $url |
            .architecture["64bit"].hash = $hash
          ' bucket/csm-gui.json > /tmp/csm-gui.json
          mv /tmp/csm-gui.json bucket/csm-gui.json

          echo "Updated to $VERSION"

      - name: Update csm (TUI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo welcomra1n/session-manager-tui --json tagName -q .tagName)
          VERSION="${LATEST#v}"
          CURRENT=$(jq -r .version bucket/csm.json)

          echo "Latest: $VERSION  Current: $CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Up to date"
            exit 0
          fi

          EXE_URL="https://github.com/welcomra1n/session-manager-tui/releases/download/${LATEST}/csm-windows-amd64.exe"
          curl -sL -o /tmp/csm.exe "$EXE_URL"
          SHA=$(sha256sum /tmp/csm.exe | awk '{print $1}')

          jq --arg v "$VERSION" --arg url "$EXE_URL" --arg hash "$SHA" '
            .version = $v |
            .architecture["64bit"].url = $url |
            .architecture["64bit"].hash = $hash
          ' bucket/csm.json > /tmp/csm.json
          mv /tmp/csm.json bucket/csm.json

          echo "Updated to $VERSION"

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/
          git commit -m "auto-update manifests"
          git push
